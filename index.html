<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加载中...</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <header class="hero">
        <div class="container">
            <h1 id="siteTitle">选品清单</h1>
            <p id="siteDesc"></p>
        </div>
    </header>

    <main class="container">
        <section class="filter-bar">
            <input type="text" id="searchInput" placeholder="搜索商品名称/ID...">
            <select id="priorityFilter"><option value="">优先级(全部)</option></select>
            <select id="l1Filter"><option value="">二级类目(全部)</option></select>
            <select id="l2Filter"><option value="">三级类目(全部)</option></select>
            <button id="resetBtn">重置</button>
        </section>

        <div class="stats">已筛选出 <span id="count">0</span> 款热销原品</div>
        <div id="productGrid" class="grid"></div>
    </main>

    <div id="toast" class="toast hidden">已复制 ID</div>
    <script src="app.js"></script>
</body>
</html>
